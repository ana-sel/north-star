<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Compass · Log · Body</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../shared/tokens.css"/>
<link rel="stylesheet" href="../shared/components.css"/>
</head>
<body class="screen-body">
  <div class="card">
    <div class="card-h">Weight · BMI</div>
    <div class="card-title">72.4 kg · BMI 22.3 · Healthy ✓</div>
  </div>
  <div class="card">
    <div class="card-h">Nutrition</div>
    <div class="prog-row"><div class="prog-label">Calories</div><div class="prog-bar"><div class="prog-fill" style="width:70%;background:var(--p-health)"></div></div><div class="prog-pct">1,980</div></div>
    <div class="prog-row"><div class="prog-label">Protein</div><div class="prog-bar"><div class="prog-fill" style="width:55%;background:var(--p-inner)"></div></div><div class="prog-pct">88g</div></div>
  </div>
  <div class="card">
    <div class="card-h">Movement · Body feel</div>
    <div class="card-body">8,420 steps · 25 min outdoor · body feel: easy</div>
  </div>
</body>
</html>
