<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Compass · Log · Energy</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../shared/tokens.css"/>
<link rel="stylesheet" href="../shared/components.css"/>
</head>
<body class="screen-body">
  <div class="card">
    <div class="card-h">4 energy sources</div>
    <div class="prog-row"><div class="prog-label">Physical</div><div class="prog-bar"><div class="prog-fill" style="width:40%;background:var(--p-health)"></div></div><div class="prog-pct">4/10</div></div>
    <div class="prog-row"><div class="prog-label">Mental</div><div class="prog-bar"><div class="prog-fill" style="width:60%;background:var(--p-inner)"></div></div><div class="prog-pct">6/10</div></div>
    <div class="prog-row"><div class="prog-label">Emotional</div><div class="prog-bar"><div class="prog-fill" style="width:50%;background:var(--p-family)"></div></div><div class="prog-pct">5/10</div></div>
    <div class="prog-row"><div class="prog-label">Purpose</div><div class="prog-bar"><div class="prog-fill" style="width:70%;background:var(--p-contrib)"></div></div><div class="prog-pct">7/10</div></div>
  </div>
  <div class="card">
    <div class="card-h">What drained energy today?</div>
    <div class="pill-row"><div class="pill on">Decision fatigue</div><div class="pill">Difficult convo</div><div class="pill">Poor sleep</div><div class="pill">Skipped lunch</div><div class="pill">Noise</div></div>
  </div>
</body>
</html>
