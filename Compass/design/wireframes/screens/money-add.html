<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Compass · Money · Add</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../shared/tokens.css"/>
<link rel="stylesheet" href="../shared/components.css"/>
</head>
<body class="screen-body">
  <div class="amount-box">
    <div><div class="amount-sub">amount</div><div class="amount-main">£14.20</div></div>
    <div class="tag" style="background:#dde9f3;color:#2c4a63;font-size:11px">Food</div>
  </div>
  <div class="cat-grid">
    <div class="cat on">Food</div><div class="cat">Move</div><div class="cat">Roof</div>
    <div class="cat">Living</div><div class="cat">Essentials</div><div class="cat">Invest</div>
    <div class="cat">Giving</div><div class="cat">Aspire</div><div class="cat">Other</div>
  </div>
  <div class="kpad">
    <div class="key">1</div><div class="key">2</div><div class="key">3</div>
    <div class="key">4</div><div class="key">5</div><div class="key">6</div>
    <div class="key">7</div><div class="key">8</div><div class="key">9</div>
    <div class="key">.</div><div class="key">0</div><div class="key">⌫</div>
  </div>
  <div class="save-row">
    <input class="note-input" placeholder="note: bakery, lunch…"/>
    <button class="save-btn-m">Save</button>
  </div>
  <div class="card" style="margin-top:10px">
    <div class="card-h">Today · 2 expenses · £22.70</div>
    <div class="row"><div class="dot" style="background:var(--p-money)"></div><div class="label">Lunch — bakery</div><div class="tag">£14.20</div></div>
    <div class="row"><div class="dot" style="background:var(--p-admin)"></div><div class="label">Bus</div><div class="tag">£8.50</div></div>
  </div>
</body>
</html>
