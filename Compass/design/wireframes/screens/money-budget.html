<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Compass · Money · Budget</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../shared/tokens.css"/>
<link rel="stylesheet" href="../shared/components.css"/>
</head>
<body class="screen-body">
  <div class="card">
    <div class="card-h">Budget · June</div>
    <div class="prog-row"><div class="prog-label">Food</div><div class="prog-bar"><div class="prog-fill" style="width:44%;background:#5a9e7a"></div></div><div class="prog-pct">44%</div></div>
    <div class="prog-row"><div class="prog-label">Roof</div><div class="prog-bar"><div class="prog-fill" style="width:100%;background:var(--p-admin)"></div></div><div class="prog-pct">done</div></div>
    <div class="prog-row"><div class="prog-label">Move</div><div class="prog-bar"><div class="prog-fill" style="width:30%;background:var(--steel)"></div></div><div class="prog-pct">30%</div></div>
    <div class="prog-row"><div class="prog-label">Living</div><div class="prog-bar"><div class="prog-fill" style="width:55%;background:var(--p-joy)"></div></div><div class="prog-pct">55%</div></div>
    <div class="prog-row"><div class="prog-label">Invest</div><div class="prog-bar"><div class="prog-fill" style="width:100%;background:var(--p-money)"></div></div><div class="prog-pct">done</div></div>
  </div>
</body>
</html>
