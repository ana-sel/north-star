<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Compass · Money · Worth</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../shared/tokens.css"/>
<link rel="stylesheet" href="../shared/components.css"/>
</head>
<body class="screen-body">
  <div class="money-hero">
    <div class="mh-label">Worth · breakdown</div>
    <div class="mh-amount">£42,300</div>
    <div class="mh-meta">Cash £8k · ISA £22k · SIPP £10k · Other £2.3k</div>
  </div>
  <div class="card">
    <div class="card-h">FIRE target</div>
    <div class="card-title">£480,000 · est. age 54</div>
    <div class="prog-row" style="margin-top:8px"><div class="prog-label">Progress</div><div class="prog-bar"><div class="prog-fill" style="width:9%;background:var(--p-money)"></div></div><div class="prog-pct">9%</div></div>
  </div>
  <div class="card">
    <div class="card-h">Land fund</div>
    <div class="prog-row"><div class="prog-label">Progress</div><div class="prog-bar"><div class="prog-fill" style="width:40%;background:var(--p-health)"></div></div><div class="prog-pct">£12k</div></div>
    <div class="card-body" style="margin-top:4px">Target £30k · +£200/month</div>
  </div>
</body>
</html>
