<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Compass · Plan · Month</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../shared/tokens.css"/>
<link rel="stylesheet" href="../shared/components.css"/>
<link rel="stylesheet" href="../shared/you.css"/>
</head>
<body class="screen-body">

  <div class="ylens">
    <div class="ylens-badge"><i class="ic ic-list"></i></div>
    <div>
      <div class="ylens-title">Month</div>
      <div class="ylens-sub">This month at a glance</div>
    </div>
  </div>

  <div class="card">
    <div class="card-h">Month kanban · June 2026</div>
    <div class="kanban-wrap">
      <div class="kanban">
        <div class="k-col">
          <div class="k-head">Backlog</div>
          <div class="k-card"><span class="k-dot" style="background:var(--p-money)"></span>Budget audit Q3</div>
          <div class="k-card"><span class="k-dot" style="background:var(--p-admin)"></span>Solicitor shortlist</div>
          <div class="k-card"><span class="k-dot" style="background:var(--p-inner)"></span>Start meditation</div>
        </div>
        <div class="k-col">
          <div class="k-head">This month</div>
          <div class="k-card"><span class="k-dot" style="background:var(--p-money)"></span>Mortgage comparison</div>
          <div class="k-card"><span class="k-dot" style="background:var(--p-admin)"></span>View 3 plots</div>
          <div class="k-card"><span class="k-dot" style="background:var(--p-health)"></span>Set sleep target</div>
        </div>
        <div class="k-col">
          <div class="k-head">This week</div>
          <div class="k-card"><span class="k-dot" style="background:var(--p-family)"></span>Call Mum</div>
          <div class="k-card"><span class="k-dot" style="background:var(--p-health)"></span>Meal prep Sunday</div>
        </div>
        <div class="k-col">
          <div class="k-head tc">Today</div>
          <div class="k-card"><span class="k-dot" style="background:var(--p-admin)"></span>Research mortgages</div>
          <div class="k-card"><span class="k-dot" style="background:var(--p-inner)"></span>Read chapter 3</div>
        </div>
        <div class="k-col">
          <div class="k-head">Done ✓</div>
          <div class="k-card done">Book dentist</div>
          <div class="k-card done">Update CV</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
