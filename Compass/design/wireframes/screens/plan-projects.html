<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Compass · Plan · Projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../shared/tokens.css"/>
<link rel="stylesheet" href="../shared/components.css"/>
<link rel="stylesheet" href="../shared/you.css"/>
</head>
<body class="screen-body">

  <div class="ylens">
    <div class="ylens-badge"><i class="ic ic-layers"></i></div>
    <div>
      <div class="ylens-title">Projects</div>
      <div class="ylens-sub">Active work and what's next</div>
    </div>
  </div>

  <div class="card">
    <div class="card-h">Projects</div>
    <div class="row"><div class="dot" style="background:var(--p-money)"></div><div class="label">Buy land</div><div class="tag">35%</div></div>
    <div class="row"><div class="dot" style="background:var(--p-admin)"></div><div class="label">Home renovation</div><div class="tag">10%</div></div>
    <div class="row"><div class="dot" style="background:var(--p-inner)"></div><div class="label">Learn Spanish</div><div class="tag">60%</div></div>
    <div class="row" style="opacity:.5"><div class="dot" style="background:var(--line)"></div><div class="label">+ Add project</div></div>
  </div>
</body>
</html>
