<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Compass · Plan · Year</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../shared/tokens.css"/>
<link rel="stylesheet" href="../shared/components.css"/>
</head>
<body class="screen-body">
  <div class="card">
    <div class="card-h">Year goals</div>
    <div class="goal-grid">
      <div class="goal-tile"><div class="g-pillar" style="background:var(--p-money)"></div><div class="g-title">Buy land</div><div class="g-pct">35% · Money</div><div class="g-bar"><div class="g-fill" style="width:35%;background:var(--p-money)"></div></div></div>
      <div class="goal-tile"><div class="g-pillar" style="background:var(--p-health)"></div><div class="g-title">Sleep 8h avg</div><div class="g-pct">60% · Health</div><div class="g-bar"><div class="g-fill" style="width:60%;background:var(--p-health)"></div></div></div>
      <div class="goal-tile"><div class="g-pillar" style="background:var(--p-inner)"></div><div class="g-title">Read 24 books</div><div class="g-pct">50% · Inner</div><div class="g-bar"><div class="g-fill" style="width:50%;background:var(--p-inner)"></div></div></div>
      <div class="goal-tile"><div class="g-pillar" style="background:var(--p-family)"></div><div class="g-title">Weekly family time</div><div class="g-pct">80% · Family</div><div class="g-bar"><div class="g-fill" style="width:80%;background:var(--p-family)"></div></div></div>
      <div class="goal-tile"><div class="g-pillar" style="background:var(--p-contrib)"></div><div class="g-title">Volunteer 2×/mo</div><div class="g-pct">20% · Contrib</div><div class="g-bar"><div class="g-fill" style="width:20%;background:var(--p-contrib)"></div></div></div>
      <div class="goal-tile" style="border-style:dashed;opacity:.5;display:flex;align-items:center;justify-content:center;"><div style="font-size:20px;color:var(--muted)">+</div></div>
    </div>
  </div>
</body>
</html>
