services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: northstar-postgres
    environment:
      POSTGRES_USER: northstar
      POSTGRES_PASSWORD: northstar_dev
      POSTGRES_DB: northstar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U northstar -d northstar"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: northstar-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
