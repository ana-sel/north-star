name: north-star

x-security: &security
  security_opt:
    - no-new-privileges:true
  restart: unless-stopped

services:
  postgres:
    <<: *security
    image: pgvector/pgvector:pg16
    container_name: northstar-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-northstar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-northstar}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-northstar} -d ${POSTGRES_DB:-northstar}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - northstar

  ollama:
    <<: *security
    image: ollama/ollama:0.4.2
    container_name: northstar-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - northstar

  backend:
    <<: *security
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: northstar-backend
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-northstar}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-northstar}
      OLLAMA_BASE_URL: http://ollama:11434
      APP_ENV: ${APP_ENV:-production}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set in .env}
    ports:
      - "127.0.0.1:8000:8000"
    read_only: true
    tmpfs:
      - /tmp:size=64m
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - northstar

volumes:
  postgres_data:
  ollama_data:

networks:
  northstar:
    driver: bridge
